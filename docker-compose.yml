services:
  postgres:
    image: postgres:15
    container_name: operaton-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: operaton
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d operaton"]
      interval: 10s
      timeout: 5s
      retries: 5

  operaton:
    image: operaton/operaton:1.0.3
    container_name: operaton
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_DRIVER: org.postgresql.Driver
      DB_URL: jdbc:postgresql://postgres:5432/operaton
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      WAIT_FOR: postgres:5432
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/operaton/app/welcome/default/ || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s

volumes:
  postgres_data:
